<h1>
  Willkommen zu deinem Tagebuch
  <button (click)="addDiary()">+</button> 
  <img (click)="del_all_items_diary()" src="/assets/img/rubbish.png" alt="Löschen" style="cursor: pointer;">
</h1>

@for (diary of diaries; track diary.id) {
  <app-entry [title]="diary.title" [text]="diary.content" [date]="diary.date"></app-entry>
} @empty {
  <p>Noch keine Einträge vorhanden.</p>
}
<app-home-btn></app-home-btn>
