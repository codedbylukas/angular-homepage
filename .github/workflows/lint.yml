name: Linting
on: [push, pull_request]
permissions:
  contents: read

jobs:
  run-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: npm ci

      - name: Run tsc --noEmit
        run: npx tsc --noEmit

      - name: Build Project (AOT Compilation Check)
        run: npm run build

      - name: Run Lint
        run: npm run lint
