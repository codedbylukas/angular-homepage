name: Deploy Angular to Pages

on:
  push:
    branches:
      - main  # Oder dein entsprechender Default-Branch

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Oder deine bevorzugte Version
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        # Ersetze <PROJECT_NAME> durch den Namen in deiner angular.json
        # Ersetze <REPOSITORY_NAME> durch deinen GitHub Repo-Namen
        run: npx ng build --configuration production --base-href /angular-homepage/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Pfad zum Build-Output (meist dist/<project-name>/browser)
          path: dist/Angular_personal_homepage/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
