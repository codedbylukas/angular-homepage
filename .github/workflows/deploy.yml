name: Deploy Angular to Pages

on:
  push:
    branches:
      - main # Default Branch

  pull_request:
    branches:
      - main # Default Branch

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Node js version used
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npx ng build --configuration production --base-href /angular-homepage/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/Angular_personal_homepage/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
