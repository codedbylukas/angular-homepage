name: Semgrep Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0' 

jobs:
  semgrep:
    name: SAST Scan
    runs-on: ubuntu-latest
    
    # Erforderliche Berechtigungen, um die Ergebnisse in GitHub anzuzeigen
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          # Lädt die Standard-Sicherheitsregeln plus spezifische für C++ und C#
          config: >-
            p/default
            p/security-audit
            p/csharp
            p/cplusplus
          generateSarif: "1"

      - name: Upload SARIF file for GitHub Advanced Security Dashboard
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        if: always() 
